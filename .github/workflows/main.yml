name: Deploy ENV to Server

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches:
      - main

jobs:
  deploy-env:
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          # Write the private key and ensure proper formatting
          echo "${{ secrets.SERVER_PRIVATE_KEY_MAIN }}" > private.key
          # Remove any carriage returns and ensure proper line endings
          sed -i 's/\r$//' private.key
          chmod 600 private.key
          ssh-keyscan -H ${{ secrets.SERVER_HOST_MAIN }} >> ~/.ssh/known_hosts
      
      - name: Validate SSH Key
        run: |
          echo "Checking key format..."
          head -n 1 private.key
          tail -n 1 private.key
          ssh-keygen -l -f private.key || echo "Key validation failed"
      
      - name: Create .env file on server
        run: |
          ssh -i private.key -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER_MAIN }}@${{ secrets.SERVER_HOST_MAIN }} << 'EOF'
            # Create directory if it doesn't exist
            mkdir -p /home/devops_bot_02/temp
            
            # Create .env file with content from ENV secret
            cat > /home/devops_bot_02/temp/.env << 'ENVEOF'
          ${{ secrets.ENV }}
          ENVEOF
            
            # Set appropriate permissions
            chmod 600 /home/devops_bot_02/temp/.env
            
            echo "✅ .env file created successfully at /home/devops_bot_02/temp/.env"
          EOF
      
      - name: Verify deployment
        run: |
          ssh -i private.key -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER_MAIN }}@${{ secrets.SERVER_HOST_MAIN }} << 'EOF'
            if [ -f /home/devops_bot_02/temp/.env ]; then
              echo "✅ File exists"
              echo "File size: $(stat -c%s /home/devops_bot_02/temp/.env 2>/dev/null || stat -f%z /home/devops_bot_02/temp/.env)"
            else
              echo "❌ File not found"
              exit 1
            fi
          EOF
      
      - name: Cleanup SSH Key
        if: always()
        run: |
          rm -f private.key
